<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Poly Copybot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <header>
        <div style="display:flex;align-items:center;gap:8px"><img src="/static/logo.png" alt="SSC" style="height:36px"><div><h1>Poly Copybot</h1><div style="font-size:.8rem;color:#5c5a6a;letter-spacing:.12em;font-weight:300">by Super Sauna Club</div></div></div>
        <div class="nav">
            <a href="/copy">Terminal</a>
            <a href="/wallets">Settings</a>
            <a href="/copy/history">History</a>
        </div>
    </header>

    <div class="section">
        <h2>Bot Settings</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Setting</th><th>Value</th><th>Description</th></tr></thead>
                <tbody id="settingsBody">
                    <tr><td colspan="3" style="color:var(--text-dim)">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <h2>Followed Traders</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Trader</th><th>PnL</th><th>Win Rate</th><th>Domain</th></tr></thead>
                <tbody id="tradersBody">
                    <tr><td colspan="4" style="color:var(--text-dim)">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <h2>System Status</h2>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Service</th><th>Status</th></tr></thead>
                <tbody id="statusBody">
                    <tr><td colspan="2" style="color:var(--text-dim)">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer>To change settings: ssh walter@10.0.0.17 "nano ~/polymarketscanner/.env"</footer>
</div>
<script>
fetch('/api/settings').then(r=>r.json()).then(d=>{
    document.getElementById('settingsBody').innerHTML=d.settings.map(s=>
        `<tr><td style="color:var(--gold);font-family:'Fira Code',monospace">${s.key}</td>
         <td style="font-weight:600;font-family:'Fira Code',monospace">${s.value}</td>
         <td style="color:var(--text-dim)">${s.desc}</td></tr>`).join('');
    document.getElementById('tradersBody').innerHTML=d.traders.map(t=>
        `<tr><td><a href="https://polymarket.com/profile/${t.address}" target="_blank">${t.username}</a></td>
         <td class="${t.pnl>=0?'positive':'negative'}">$${Number(t.pnl).toLocaleString()}</td>
         <td>${t.win_rate}%</td><td>${t.domain}</td></tr>`).join('')||'<tr><td colspan="4">No traders followed</td></tr>';
    document.getElementById('statusBody').innerHTML=d.status.map(s=>
        `<tr><td>${s.name}</td><td style="color:${s.ok?'var(--green)':'var(--red)'}">${s.label}</td></tr>`).join('');
}).catch(()=>{document.getElementById('settingsBody').innerHTML='<tr><td colspan="3" style="color:var(--red)">Failed to load</td></tr>'});
</script>
</body>
</html>
