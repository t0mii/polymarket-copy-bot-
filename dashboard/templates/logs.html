<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Log — Poly CopyBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/terminal.css">
<style>
/* ── logs-page specific ── */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.btn{font-size:.72rem;font-family:var(--mono);padding:5px 12px;border:1px solid var(--border);background:var(--bg2);color:var(--text-mid);cursor:pointer;letter-spacing:.06em;transition:all .2s;border-radius:2px}
.btn:hover{border-color:var(--gold-dim);color:var(--text)}
.btn.act{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.08)}
.btn-pause{border-color:var(--red);color:var(--red)}
.btn-pause.act{background:rgba(248,113,113,0.1)}
.search{font-size:.78rem;font-family:var(--mono);padding:5px 12px;border:1px solid var(--border);background:var(--bg2);color:var(--text);width:220px;outline:none}
.search:focus{border-color:var(--gold)}
.count{font-size:.68rem;color:var(--text-dim);font-family:var(--mono);margin-left:auto}

.log-box{border:1px solid var(--border);background:var(--bg2);height:calc(100vh - 240px);overflow-y:auto;font-family:var(--mono);font-size:.75rem;line-height:1.7;padding:8px 0}
.log-box::-webkit-scrollbar{width:6px}
.log-box::-webkit-scrollbar-track{background:var(--bg2)}
.log-box::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:3px}
.ll{padding:1px 14px;white-space:pre-wrap;word-break:break-all;border-left:2px solid transparent}
.ll:hover{background:rgba(201,168,76,0.03)}
.ll .ts{color:var(--text-dim)}
.ll .lv-INFO{color:var(--blue)}
.ll .lv-WARNING{color:var(--yellow)}
.ll .lv-ERROR{color:var(--red);font-weight:600}
/* Highlight keywords */
.ll.has-filter{border-left-color:var(--yellow)}
.ll.has-skip{border-left-color:var(--text-dim)}
.ll.has-buy{border-left-color:var(--green)}
.ll.has-sell{border-left-color:var(--red)}
.ll.has-hedge{border-left-color:var(--purple)}
.ll.has-copy{border-left-color:var(--green)}
.ll.has-close{border-left-color:var(--red)}
.ll.has-error{border-left-color:var(--red);background:rgba(248,113,113,0.03)}
.hl-filter{color:var(--yellow);font-weight:600}
.hl-skip{color:var(--text-mid)}
.hl-buy{color:var(--green);font-weight:600}
.hl-sell{color:var(--red);font-weight:600}
.hl-hedge{color:var(--purple);font-weight:600}
.hl-copy{color:var(--green);font-weight:600}
.hl-close{color:var(--red)}
.hl-price{color:var(--cyan)}
.hl-trader{color:var(--gold)}
</style>
</head>
<body>
<div class="scan"></div>
<div class="app">
  <header class="hd">
    <div class="hd-left">
      <img src="/static/logo.png" alt="SSC" class="hd-logo-img" onerror="this.style.display='none'">
      <div>
        <div class="logo">Poly Copybot</div>
        <div class="logo-sub">by Super Sauna Club</div>
      </div>
    </div>
    <div class="hd-center">
      <div class="digiclock" id="digiClock">--:--:--</div>
      <div class="live-tag"><span class="live-dot"></span>LIVE</div>
      <div class="status-tags">
        <div class="st"><span class="st-dot" id="stBot"></span>Bot</div>
        <div class="st"><span class="st-dot" id="stApi"></span>API</div>
        <div class="st"><span class="st-dot" id="stPoll"></span>Poll</div>
      </div>
    </div>
    <div class="hd-right" style="display:flex;align-items:center;gap:8px">
      <button class="sfx-btn" id="sscSound" type="button">&#128264; Sound</button>
      <button class="sfx-btn" id="sscWide" type="button" title="Switch layout">&#9724; Desktop</button>
      {% with active='logs' %}{% include '_nav.html' %}{% endwith %}
    </div>
  </header>

  <div class="tk-wrap">
    <div class="tk" id="sscTicker"><div class="tk-i dim">Initializing market flow...</div></div>
  </div>

  <div class="toolbar">
    <button class="btn act" data-f="" onclick="setFilter(this,'')">ALL</button>
    <button class="btn" data-f="filter,skip" onclick="setFilter(this,'filter,skip')">FILTERED</button>
    <button class="btn" data-f="copy trade,buy,order buy" onclick="setFilter(this,'copy trade,buy,order buy')">BUYS</button>
    <button class="btn" data-f="sell,fast-sell,auto-sell" onclick="setFilter(this,'sell,fast-sell,auto-sell')">SELLS</button>
    <button class="btn" data-f="hedge" onclick="setFilter(this,'hedge')">HEDGE</button>
    <button class="btn" data-f="event-wait" onclick="setFilter(this,'event-wait')">EVENT-WAIT</button>
    <button class="btn" data-f="closed,close,resolved" onclick="setFilter(this,'closed,close,resolved')">CLOSES</button>
    <button class="btn" data-f="error,fehler,warning" onclick="setFilter(this,'error,fehler,warning')">ERRORS</button>
    <button class="btn" data-f="portfolio,snapshot" onclick="setFilter(this,'portfolio,snapshot')">PORTFOLIO</button>
    <input class="search" id="search" placeholder="Freitext-Suche..." oninput="applySearch()">
    <button class="btn btn-pause" id="pauseBtn" onclick="togglePause()">PAUSE</button>
    <span class="count" id="lineCount">0 lines</span>
  </div>

  <div class="log-box" id="logBox"></div>
</div>

<div class="popup-slot"></div>
<script src="/static/terminal.js"></script>
<script>
let lines=[], filter='', paused=false, autoScroll=true, searchTxt='', lastMeta=null;

function setFilter(btn, f){
  filter=f;
  document.querySelectorAll('.toolbar .btn:not(.btn-pause)').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  lines=[];
  lastMeta=null;
  render();
  fetchLogs();
}
function togglePause(){
  paused=!paused;
  document.getElementById('pauseBtn').classList.toggle('act',paused);
  document.getElementById('pauseBtn').textContent=paused?'PAUSED':'PAUSE';
  if(!paused){autoScroll=true;fetchLogs()}
}
function applySearch(){
  searchTxt=document.getElementById('search').value.toLowerCase();
  render();
}

function colorize(line){
  // Extract timestamp and level
  let m=line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d+) \[(\w+)\] (.+)/);
  if(!m) return `<span>${esc(line)}</span>`;
  let ts=m[1], lv=m[2], rest=m[3];
  let e=esc(rest);
  // Highlight keywords
  e=e.replace(/\[FILTER\]/g,'<span class="hl-filter">[FILTER]</span>');
  e=e.replace(/\[SKIP\]/g,'<span class="hl-skip">[SKIP]</span>');
  e=e.replace(/\[NEW\]/g,'<span class="hl-buy">[NEW]</span>');
  e=e.replace(/COPY TRADE/g,'<span class="hl-copy">COPY TRADE</span>');
  e=e.replace(/ORDER BUY:/g,'<span class="hl-buy">ORDER BUY:</span>');
  e=e.replace(/ORDER SELL:/g,'<span class="hl-sell">ORDER SELL:</span>');
  e=e.replace(/\[FAST-SELL\]/g,'<span class="hl-sell">[FAST-SELL]</span>');
  e=e.replace(/\[AUTO-SELL\]/g,'<span class="hl-sell">[AUTO-SELL]</span>');
  e=e.replace(/\[AUTO-CLOSE\]/g,'<span class="hl-close">[AUTO-CLOSE]</span>');
  e=e.replace(/\[HEDGE-WAIT\]/g,'<span class="hl-hedge">[HEDGE-WAIT]</span>');
  e=e.replace(/\[EVENT-WAIT\]/g,'<span class="hl-hedge">[EVENT-WAIT]</span>');
  e=e.replace(/\[DIFF\]/g,'<span class="hl-filter">[DIFF]</span>');
  e=e.replace(/\[MISS-CLOSE\]/g,'<span class="hl-close">[MISS-CLOSE]</span>');
  e=e.replace(/\[STOP-LOSS\]/g,'<span class="hl-sell">[STOP-LOSS]</span>');
  e=e.replace(/\[TAKE-PROFIT\]/g,'<span class="hl-buy">[TAKE-PROFIT]</span>');
  e=e.replace(/FILLED/g,'<span class="hl-buy">FILLED</span>');
  e=e.replace(/FAILED/g,'<span class="hl-sell">FAILED</span>');
  e=e.replace(/(\$[\-+]?\d+\.?\d*)/g,'<span class="hl-price">$1</span>');
  e=e.replace(/(\d+c\b)/g,'<span class="hl-price">$1</span>');
  e=e.replace(/(xsaghav|sovereign2013|KING7777777|fsavhlc|Jargs)/g,'<span class="hl-trader">$1</span>');
  return `<span class="ts">${esc(ts)}</span> <span class="lv-${lv}">[${lv}]</span> ${e}`;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function classify(line){
  let l=line.toLowerCase();
  if(l.includes('[error]')||l.includes('fehler'))return 'has-error';
  if(l.includes('[filter]'))return 'has-filter';
  if(l.includes('[skip]'))return 'has-skip';
  if(l.includes('hedge'))return 'has-hedge';
  if(l.includes('copy trade')||l.includes('order buy'))return 'has-buy';
  if(l.includes('sell')||l.includes('auto-sell'))return 'has-sell';
  if(l.includes('closed')||l.includes('close')||l.includes('resolved'))return 'has-close';
  return '';
}

function render(){
  let box=document.getElementById('logBox');
  // Button-level filter is now server-side; only the free-text search still runs here.
  let filtered=lines;
  if(searchTxt){
    filtered=filtered.filter(l=>l.toLowerCase().includes(searchTxt));
  }
  let metaTxt=filtered.length+' / '+lines.length+' lines';
  if(lastMeta&&filter){
    metaTxt+=' · '+lastMeta.matched+' matched of '+lastMeta.scanned+' scanned';
  }
  document.getElementById('lineCount').textContent=metaTxt;
  box.innerHTML=filtered.map(l=>`<div class="ll ${classify(l)}">${colorize(l)}</div>`).join('');
  if(autoScroll)box.scrollTop=box.scrollHeight;
}

// Detect manual scroll (user scrolled up = pause auto-scroll)
document.addEventListener('DOMContentLoaded',()=>{
  let box=document.getElementById('logBox');
  box.addEventListener('scroll',()=>{
    let atBottom=box.scrollHeight-box.scrollTop-box.clientHeight<50;
    autoScroll=atBottom;
  });
});

async function fetchLogs(){
  if(paused)return;
  try{
    let url='/api/logs?lines=500';
    if(filter){
      url+='&filter='+encodeURIComponent(filter)+'&scan=100000';
    }
    let r=await fetch(url);
    let d=await r.json();
    lines=d.lines||[];
    lastMeta=d;
    render();
  }catch(e){console.error('Log fetch error:',e)}
}

// Initial load + auto-refresh every 3 seconds
fetchLogs();
setInterval(()=>{if(!paused)fetchLogs()},3000);
</script>
</body>
</html>
